<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8" />
<!-- viewport-fit=cover lets us paint into the iPhone notch / home-indicator area,
     then we reclaim safe space with env(safe-area-inset-*) in CSS. -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#16191D" />
<!-- iOS "Add to Home Screen" hints: run full-screen, dark status bar, custom title + icon -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="−10" />
<link rel="apple-touch-icon" href="./apple-touch-icon.png" />
<link rel="icon" href="./icon-192.png" />
<link rel="manifest" href="./manifest.json" />
<title>−10 · drumul meu</title>
<style>
  /* ─────────── DESIGN TOKENS — Direcția C „Echilibru" ───────────
     lime = energie/progres ; amber = căldură/serie/obiectiv ;
     layoutul rămâne calm. Fundalul NU e negru pur — cărbune moale. */
  :root{
    --bg:#16191D; --surface:#20242A; --nav:#1a1e23; --track:#171a1f;
    --text:#ECEFF1; --muted:#97A0A8; --faint:#5b646c;
    --lime:#C8FF3C; --lime-2:#9bd44f; --lime-grad:linear-gradient(90deg,#9bd44f,#C8FF3C);
    --amber:#E8B27D;
    --hair:rgba(255,255,255,.05); --bd-lime:rgba(200,255,60,.18); --bd-amber:rgba(232,178,125,.30);
    /* alias-uri vechi → paleta nouă, ca ecranele nerefăcute să meargă neatins */
    --surface2:#20242A; --line:var(--hair);
    --accent:var(--lime); --accent2:var(--lime); --accent-d:var(--lime-2);
    --warn:var(--amber); --danger:#e8918a; --gold:var(--amber);
    --r:20px; --tap:52px;            /* tap target >= 48px everywhere */
    --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
    --safe-l:env(safe-area-inset-left); --safe-r:env(safe-area-inset-right);
  }
  /* ─── Fonturi self-hosted (offline). Jakarta = UI ; Oswald = DOAR cifre ─── */
  @font-face{font-family:'Jakarta';font-style:normal;font-weight:400 800;font-display:swap;
    src:url(./fonts/jakarta-latin.woff2) format('woff2');
    unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+2000-206F,U+2074,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;}
  @font-face{font-family:'Jakarta';font-style:normal;font-weight:400 800;font-display:swap;
    src:url(./fonts/jakarta-latinext.woff2) format('woff2');
    unicode-range:U+0100-02AF,U+0304,U+0308,U+0329,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20CF,U+2113,U+2C60-2C7F,U+A720-A7FF;}
  @font-face{font-family:'Oswald';font-style:normal;font-weight:700;font-display:swap;
    src:url(./fonts/oswald-latin.woff2) format('woff2');
    unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+2000-206F,U+2074,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;}
  @font-face{font-family:'Oswald';font-style:normal;font-weight:700;font-display:swap;
    src:url(./fonts/oswald-latinext.woff2) format('woff2');
    unicode-range:U+0100-02AF,U+0304,U+0308,U+0329,U+1E00-1E9F,U+1EF2-1EFF,U+2020,U+20A0-20AB,U+20AD-20CF,U+2113,U+2C60-2C7F,U+A720-A7FF;}
  /* Oswald se aplică DOAR pe cifre (greutate, %, timer, serie, măsurători). */
  .num{font-family:'Oswald',sans-serif; font-weight:700; letter-spacing:-.5px; font-variant-numeric:tabular-nums;}
  .num .u{font-size:.42em; color:var(--muted); margin-left:.12em; letter-spacing:0;}
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%; overflow:hidden;       /* lock the page; we scroll an inner container */
    overscroll-behavior:none;}                            /* kill rubber-band so it feels native */
  body{
    background:var(--bg); color:var(--text); font-weight:450;
    font-family:'Jakarta',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.45;
    user-select:none; -webkit-user-select:none;
  }
  #app{display:flex; flex-direction:column; height:100dvh;}
  /* The ONLY scroll container — gets safe-area top padding so content clears the notch. */
  #scroll{
    flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain;
    padding:calc(var(--safe-t) + 14px) calc(var(--safe-r) + 16px)
            120px calc(var(--safe-l) + 16px);            /* bottom pad clears the nav */
  }
  h1,h2,h3{margin:0; font-weight:750; letter-spacing:-.02em;}
  h1{font-size:25px;} h2{font-size:18px;} h3{font-size:15px;}
  p{margin:0;}
  .muted{color:var(--muted);} .faint{color:var(--faint);} .sm{font-size:13px;}
  .accent{color:var(--accent2);} .warn{color:var(--warn);} .danger{color:var(--danger);}
  .center{text-align:center;}

  .card{background:var(--surface); border:1px solid var(--line);
    border-radius:var(--r); padding:16px; margin-bottom:14px;}
  .card.tight{padding:13px;}
  .row{display:flex; align-items:center; gap:12px;}
  .between{display:flex; align-items:center; justify-content:space-between; gap:12px;}
  .wrap{flex-wrap:wrap;}
  .grow{flex:1; min-width:0;}

  /* Buttons */
  button{font-family:inherit; cursor:pointer; border:none; color:inherit;
    font-size:15px; font-weight:600;}
  .btn{min-height:var(--tap); padding:0 18px; border-radius:14px;
    background:var(--surface2); border:1px solid var(--line); color:var(--text);
    display:inline-flex; align-items:center; justify-content:center; gap:8px;}
  .btn:active{transform:scale(.97);}
  .btn.primary{background:var(--lime-grad);
    border:none; color:#0e1418; font-weight:800;}
  .btn.ghost{background:transparent;}
  .btn.full{width:100%;}
  .btn.sm{min-height:42px; padding:0 14px; font-size:14px;}
  .pill{height:34px; padding:0 12px; border-radius:999px; font-size:13px;
    background:var(--surface2); border:1px solid var(--line); display:inline-flex;
    align-items:center; gap:6px; color:var(--muted);}

  /* Big toggle row for the daily checklist */
  .check{width:100%; display:flex; align-items:center; gap:14px; min-height:var(--tap);
    padding:13px 14px; border-radius:14px; background:var(--surface2);
    border:1px solid var(--line); text-align:left; margin-bottom:10px; transition:.15s;}
  .check .box{width:30px; height:30px; flex:none; border-radius:9px;
    border:2px solid var(--faint); display:flex; align-items:center; justify-content:center;
    font-size:18px; color:transparent;}
  .check.on{background:rgba(200,255,60,.10); border-color:var(--bd-lime);}
  .check.on .box{background:var(--lime); border-color:var(--lime); color:#16191D;}
  .check .t{font-weight:650; font-size:15px;}
  .check .s{font-size:12.5px; color:var(--muted);}
  .check.opt{opacity:.92;}

  /* Progress bars — 8px, fără glow, fill lime-gradient */
  .bar{height:8px; border-radius:999px; background:var(--track); overflow:hidden;}
  .bar>i{display:block; height:100%; background:var(--lime-grad); border-radius:999px; transition:width .35s;}
  .counter{display:flex; gap:8px; margin-top:10px;}
  .counter button{flex:1; min-height:46px; border-radius:12px; background:#272c33;
    border:1px solid var(--hair); font-weight:700;}
  .counter input{width:64px; min-height:46px; text-align:center; border-radius:12px;
    background:var(--track); border:1px solid var(--hair); color:var(--text); font-size:15px;}
  /* Adăugare rapidă proteine — chips tappabile */
  .foodchips{display:flex; flex-wrap:wrap; gap:8px;}
  .foodchip{min-height:44px; padding:0 13px; border-radius:12px; font-size:13.5px; font-weight:600;
    background:#272c33; border:1px solid var(--hair); color:var(--text);}
  .foodchip b{color:var(--lime); margin-left:2px;}
  .foodchip:active{transform:scale(.95); background:rgba(200,255,60,.14); border-color:var(--bd-lime);}

  /* Bottom nav — bară surface-2, tab activ lime cu punct */
  #nav{display:flex; background:var(--nav); border-top:1px solid var(--hair);
    padding:10px calc(var(--safe-r) + 6px) calc(var(--safe-b) + 18px) calc(var(--safe-l) + 6px);}
  #nav button{flex:1; min-height:var(--tap); background:none; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:5px; color:var(--faint); font-size:11px; font-weight:700;
    letter-spacing:.3px;}
  #nav button .ic{font-size:18px; line-height:1; opacity:.85;}
  #nav button.on{color:var(--lime);}
  #nav button.on .ic{display:none;}
  #nav button.on::before{content:""; width:9px; height:9px; border-radius:50%; background:var(--lime);
    box-shadow:0 0 10px rgba(200,255,60,.6);}

  /* ════ COMPONENTE DIRECȚIA C ════ */
  .eyebrow{font-size:12px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; color:var(--muted);}
  .hero{font-size:66px; line-height:.85; letter-spacing:-1px; margin:6px 0 0;}
  .calm{color:var(--muted); font-size:14px; line-height:1.45; margin-top:14px;}
  .focal{border:1px solid var(--bd-lime); border-radius:22px;}
  /* tiluri-statistică (2 pe rând) */
  .tiles{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:14px 0;}
  .tile{background:var(--surface); border:1px solid var(--hair); border-radius:18px; padding:14px 16px;}
  .tile .v{font-size:26px; line-height:1;}
  .tile .l{color:var(--muted); font-size:13px; margin-top:7px;}
  /* listă de azi — rânduri-metrică cu bară */
  .listhead{display:flex; justify-content:space-between; align-items:baseline; margin:6px 2px 10px;}
  .listhead h3{font-size:13px;} .listhead .ct{color:var(--muted); font-size:13px;}
  .mrow{background:var(--surface); border:1px solid var(--hair); border-radius:16px; padding:13px 15px; margin-bottom:9px;}
  .mrow .top{display:flex; justify-content:space-between; align-items:baseline; gap:10px;}
  .mrow .nm{font-size:15px; font-weight:600;}
  .mrow .val{font-size:16px;}
  .mrow .sub{font-size:11.5px; margin:3px 0 9px;}
  .mrow .sub.lime{color:var(--lime);}
  /* rând cu pictogramă (forță) + checkbox circular */
  .wrow{display:flex; align-items:center; gap:13px; background:var(--surface); border:1px solid var(--hair);
    border-radius:16px; padding:12px 15px; margin-bottom:9px; width:100%; text-align:left;}
  .wrow .ic{width:46px; height:46px; flex:none; border-radius:13px; background:rgba(200,255,60,.12);
    display:flex; align-items:center; justify-content:center; font-size:22px;}
  .wrow .ttl{font-size:15px; font-weight:600;} .wrow .st{font-size:12.5px; color:var(--muted);}
  .ck{width:26px; height:26px; flex:none; border-radius:50%; border:2px solid #3a4047;
    display:flex; align-items:center; justify-content:center; font-size:15px; color:transparent;}
  .ck.on{background:var(--lime); border-color:var(--lime); color:#16191D;}
  .wrow.on .ic{background:rgba(200,255,60,.16);}
  /* perechi de „done chips" */
  .donechips{display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:9px;}
  .donechip{display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--hair);
    border-radius:14px; padding:13px 14px; width:100%; text-align:left; font-size:14px; font-weight:600;}
  .donechip .ck{width:24px; height:24px; font-size:13px;}
  .dashrow{display:flex; align-items:center; gap:12px; background:transparent; border:1px dashed rgba(255,255,255,.12);
    border-radius:14px; padding:13px 15px; width:100%; text-align:left; color:var(--muted); font-size:14px; margin-bottom:9px;}
  .dashrow.on{color:var(--text); border-style:solid; border-color:var(--bd-lime);}
  /* butonul „Moment greu" — amber, calm, niciodată alarmant */
  .moment{width:100%; min-height:var(--tap); border-radius:999px; margin-top:6px;
    background:rgba(232,178,125,.14); border:1px solid var(--bd-amber); color:var(--amber);
    font-size:15px; font-weight:700; display:flex; align-items:center; justify-content:center; gap:9px;}
  .moment:active{transform:scale(.98);}
  /* chip delta pe PROGRES + chip-uri sănătate */
  .deltachip{display:inline-flex; align-items:center; gap:3px; background:rgba(200,255,60,.16); color:var(--lime);
    border-radius:8px; padding:5px 9px; font-size:15px; vertical-align:middle;}
  .hrow{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:13px 0;}
  .hrow+.hrow{border-top:1px solid var(--hair);}
  .hchip{font-size:12px; font-weight:700; border-radius:999px; padding:4px 10px;}
  .hchip.lime{background:rgba(200,255,60,.14); color:var(--lime);}
  .hchip.amber{background:rgba(232,178,125,.14); color:var(--amber);}

  /* Weekly grid */
  .week{display:grid; grid-template-columns:1fr; gap:8px;}
  .day{display:flex; align-items:center; flex-wrap:wrap; gap:8px 12px; padding:12px 14px; border-radius:13px;
    background:var(--surface2); border:1px solid var(--line);}
  .day .dname{flex:1 1 auto; min-width:max-content;}   /* won't shrink below its text → tags wrap below when crowded */
  .day .tags{display:flex; flex-wrap:wrap; gap:6px; justify-content:flex-end; flex-shrink:0; margin-left:auto;}
  .day.today{border-color:var(--accent); background:rgba(16,185,129,.10);}
  .day .dn{width:42px; font-weight:750; font-size:13px; color:var(--muted);}
  .tag{font-size:11px; font-weight:750; padding:3px 9px; border-radius:999px;}
  .tag.forta{background:rgba(52,211,153,.16); color:var(--accent2);}
  .tag.sport{background:rgba(96,165,250,.16); color:#7cb1ff;}
  .tag.odihna{background:rgba(148,163,184,.14); color:#aab8d4;}
  .tag.treat{background:rgba(252,211,77,.16); color:var(--gold);}
  .tag.weigh{background:rgba(248,113,113,.15); color:#ffb4b4;}

  /* Health table */
  table{width:100%; border-collapse:collapse; font-size:14px;}
  td{padding:8px 4px; border-bottom:1px solid var(--line);}
  td:last-child{text-align:right; font-variant-numeric:tabular-nums;}
  .dir{font-size:12px; margin-left:6px;}

  /* Collapsible cheat-sheets */
  details{background:var(--surface); border:1px solid var(--line); border-radius:var(--r);
    margin-bottom:12px; overflow:hidden;}
  summary{list-style:none; cursor:pointer; padding:15px 16px; font-weight:700; font-size:15px;
    display:flex; align-items:center; justify-content:space-between; min-height:var(--tap);}
  summary::-webkit-details-marker{display:none;}
  summary::after{content:"＋"; color:var(--muted); font-weight:700;}
  details[open] summary::after{content:"－";}
  details .body{padding:0 16px 16px; font-size:14px; color:var(--muted);}
  details .body b{color:var(--text);}
  .swap{padding:9px 0; border-top:1px solid var(--line);}
  .swap .x{color:#ffb4b4;} .swap .y{color:var(--accent2);}

  /* Overlay (onboarding / modals / pin / lock) */
  #overlay{position:fixed; inset:0; z-index:50; display:none; background:rgba(8,10,12,.74);
    backdrop-filter:blur(7px); align-items:center; justify-content:center;
    padding:calc(var(--safe-t) + 18px) 18px calc(var(--safe-b) + 18px);}
  #overlay.show{display:flex;}
  .sheet{width:100%; max-width:460px; max-height:100%; overflow-y:auto;
    background:var(--surface); border:1px solid var(--hair); border-radius:28px; padding:22px;}
  /* modal de sărbătoare — glow lime moale */
  .sheet.celebrate{max-width:318px; text-align:center; border:1px solid rgba(200,255,60,.22);
    box-shadow:0 0 50px rgba(200,255,60,.14), 0 30px 60px rgba(0,0,0,.5);}
  .celebrate .halo{width:96px; height:96px; margin:4px auto 14px; border-radius:50%;
    background:radial-gradient(circle, rgba(200,255,60,.30), rgba(200,255,60,0) 70%);
    display:flex; align-items:center; justify-content:center; font-size:44px;}
  .modal-emoji{font-size:46px; text-align:center;}
  textarea,input.text{width:100%; background:var(--track); border:1px solid var(--hair);
    color:var(--text); border-radius:13px; padding:12px; font-size:15px; font-family:inherit;}
  textarea{min-height:84px; resize:vertical;}
  label.fld{display:block; font-size:13px; color:var(--muted); margin:12px 0 6px;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}

  /* Update banner */
  #update{position:fixed; left:12px; right:12px; bottom:calc(var(--safe-b) + 84px); z-index:60;
    display:none; background:var(--lime); color:#16191D; border-radius:14px;
    padding:13px 16px; font-weight:750; align-items:center; justify-content:space-between; gap:10px;
    box-shadow:0 10px 30px rgba(0,0,0,.4);}
  #update.show{display:flex;}

  .ringwrap{display:flex; align-items:center; gap:16px;}
  .seg{display:flex; gap:8px;} .seg .pill{flex:1; justify-content:center;}
  .kpi{font-size:30px; font-weight:800; letter-spacing:-.03em; font-variant-numeric:tabular-nums;}
  .hidden{display:none !important;}
  a{color:var(--accent2);}
</style>
</head>
<body>
<div id="app">
  <main id="scroll"><div id="screen"></div></main>
  <nav id="nav">
    <button data-nav="azi"      class="on"><span class="ic">☀️</span>AZI</button>
    <button data-nav="saptamana"><span class="ic">🗓️</span>SĂPTĂMÂNĂ</button>
    <button data-nav="progres"><span class="ic">📈</span>PROGRES</button>
    <button data-nav="jurnal"><span class="ic">📓</span>JURNAL</button>
  </nav>
</div>
<div id="overlay"></div>
<div id="update">
  <span>O actualizare e gata.</span>
  <button class="btn sm" style="background:#16191D;color:var(--lime)" data-action="apply-update">Reîmprospătează</button>
</div>

<script>
"use strict";
/* ════════════════════════════════════════════════════════════════════════
   −10 · drumul meu  —  app personală de slăbit (un singur utilizator).
   Fără backend, fără cont, fără build. Toate datele în localStorage.
   Ton: blând, fără rușine. Medicamentul (sertralină) crește pofta — asta
   NU e o slăbiciune de voință, iar aplicația vorbește mereu așa.
   ════════════════════════════════════════════════════════════════════════ */

/* ═══════════════════ 1. STRINGS — tot textul, într-un loc ═══════════════════
   Editează AICI orice formulare. Totul e în română, „tu", informal. */
const S = {
  appTitle:"−10 · drumul meu",
  nav:{azi:"AZI", saptamana:"SĂPTĂMÂNĂ", progres:"PROGRES", jurnal:"JURNAL"},

  // Linii motivaționale rotative (AZI, sus). {lost}/{rem} se înlocuiesc.
  // Identitate + „de ce"-ul (fetița). Nimic restrictiv, nimic punitiv.
  motiv:[
    "Ești genul de tată care apare. {lost} kg jos — mai ai {rem} până la 70. 💚",
    "Fetița ta nu vrea un tată perfect, vrea un tată prezent. Azi miști puțin corpul, atât.",
    "{lost} kg mai ușor decât la start. Corpul tău ține minte fiecare zi bună.",
    "Energia pe care o aduni azi e energia cu care te joci cu ea mâine.",
    "Pofta poate veni din medicament, nu din tine. Proteina de azi e aliatul tău.",
    "Mai ai {rem} kg până la 70. Nu grăbit — constant. Tu ești omul care rămâne.",
    "Un pas, un pahar de apă, o masă cu proteine. Atât cere ziua de azi de la tine.",
  ],
  motivStart:"Începem de unde ești azi — fără rușine, doar înainte. Fetița ta te vrea sănătos și prezent mulți ani.",

  todayPct:"complet azi",
  hello:"Bună", toGoal:"spre obiectiv", streakShort:"zile la rând",
  calmTail:"Fetița ta are nevoie de un tată în formă. 💚",
  listToday:"Lista de azi",
  windowLabel:"FEREASTRA DE MÂNCARE",
  untilMeal:"până la masă", untilClose:"până se închide", eveningFast:"post de seară",
  // Checklist
  fastTitle:"Postul 16:8",
  fastBefore:"Fereastra de mâncare se deschide la {start}. Până atunci: apă, cafea, răbdare. Mai sunt {h}.",
  fastIn:"Ești în fereastra de mâncare ({start}–{end}). Se închide în {h}. Pune proteina prima.",
  fastAfter:"Post de seară. Te odihnești, corpul lucrează. Fereastra revine mâine la {start}.",
  fastOkLabel:"Postul respectat azi",
  fastShorten:"Scurtează postul azi",
  fastShortened:"Ai scurtat postul azi — zero penalizare. Zi grea, alegere bună. 🤍",

  proteinTitle:"Proteine",
  proteinSub:"Antidotul foamei date de medicament. Țintă {goal} g.",
  proteinAntidote:"antidotul tău la foame",
  protFoodsHint:"Sau apasă ce ai mâncat — se adună singur:",
  waterTitle:"Apă",
  waterSub:"Țintă {goal} L.",

/* ═══════════════════ 3. STORAGE — localStorage, cu migrare ═══════════════════
   Un singur obiect JSON. schemaVersion + loader defensiv = update-urile
   viitoare NU îți șterg niciodată istoricul. Plus o oglindă (backup) într-o
   a doua cheie, ca plasă de siguranță. */
const KEY = "minus10.state";
const MIRROR = "minus10.state.backup";
const SCHEMA = 1;

function defaultState(){
  return {
    schemaVersion:SCHEMA,
    profile:{
      onboarded:false, name:CONFIG.name, age:CONFIG.age, heightCm:CONFIG.heightCm,
      goalWeightKg:CONFIG.goalWeightKg, startWeightKg:CONFIG.startWeightKg,
      why:S.obWhyDefault,
    },
    settings:{
      eatStart:CONFIG.eatStart, eatEnd:CONFIG.eatEnd,
      trainingDays:CONFIG.trainingDays.slice(),
      showSmoking:false, pin:null,
      lastBackup:null,
    },
    dailyLogs:{},          // { "2026-06-30": {…} }
    weightHistory:[{date:todayKey(), kg:CONFIG.startWeightKg}],
    waistHistory:[{date:todayKey(), waist:CONFIG.startWaistCm, belly:CONFIG.startBellyCm}],
    // Gol la început — îți adaugi propriile analize în PROGRES → „Adaugă primele
    // analize" (rămân doar pe telefon). Aplicația marchează HDL mic automat.
    bloodHistory:[],
    celebrated:[],          // praguri de kg deja sărbătorite
  };
}

// Loader defensiv: niciodată nu aruncă, migrează vechi → nou, umple lipsuri.
function loadState(){
  let raw = localStorage.getItem(KEY) || localStorage.getItem(MIRROR);
  if(!raw) return defaultState();
  let data;
  try{ data = JSON.parse(raw); }catch(e){ console.warn("state corupt, oglindă", e);
    try{ data = JSON.parse(localStorage.getItem(MIRROR)); }catch(_){ return defaultState(); } }
  if(!data || typeof data!=="object") return defaultState();
  return migrate(data);
}
function migrate(data){
  const base = defaultState();
  // Merge defensiv pe nivel: păstrăm tot ce există, adăugăm câmpuri noi.
  const out = {
    ...base, ...data,
    profile:{...base.profile, ...(data.profile||{})},
    settings:{...base.settings, ...(data.settings||{})},
    dailyLogs:data.dailyLogs||{},
    weightHistory:Array.isArray(data.weightHistory)&&data.weightHistory.length?data.weightHistory:base.weightHistory,
    waistHistory:Array.isArray(data.waistHistory)&&data.waistHistory.length?data.waistHistory:base.waistHistory,
    bloodHistory:Array.isArray(data.bloodHistory)&&data.bloodHistory.length?data.bloodHistory:base.bloodHistory,
    celebrated:Array.isArray(data.celebrated)?data.celebrated:[],
  };
  // Aici intră migrările viitoare, ex: if(out.schemaVersion < 2){ ... }
  out.schemaVersion = SCHEMA;
  return out;
}
let state = loadState();

function save(){
  try{
    const json = JSON.stringify(state);
    localStorage.setItem(KEY, json);
    localStorage.setItem(MIRROR, json);   // oglinda
  }catch(e){ console.error("Nu pot salva", e); }
}

/* ═══════════════════ 4. HELPERS de dată ═══════════════════ */
function dateKey(d){ // YYYY-MM-DD în ora LOCALĂ (nu UTC, ca să nu sară ziua)
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function todayKey(){ return dateKey(new Date()); }
function parseKey(k){ const [y,m,d]=k.split("-").map(Number); return new Date(y,m-1,d); }
function daysBetween(a,b){ return Math.round((parseKey(b)-parseKey(a))/86400000); }
function ageYears(){ const a=Number(state?.profile?.age); return a>0?a:CONFIG.age; }
function fmtDate(k){ const d=parseKey(k);
  return d.getDate()+" "+["ian","feb","mar","apr","mai","iun","iul","aug","sep","oct","nov","dec"][d.getMonth()]+" "+d.getFullYear(); }
function minutesOf(hhmm){ const [h,m]=hhmm.split(":").map(Number); return h*60+m; }
function fmtDur(mins){ const h=Math.floor(mins/60), m=mins%60; return h>0?(h+"h "+(m>0?m+"m":"")).trim():m+"m"; }

/* ═══════════════════ 5. COMPUTE — ținte adaptive & progres ═══════════════════ */
// Mifflin–St Jeor (bărbat). Recalculat din greutatea CURENTĂ la fiecare cântărire.
//   BMR = 10*kg + 6.25*înălțime − 5*vârstă + 5
//   mentenanță = round(BMR * 1.45)        (sedentar-ușor)
//   țintă      = max(1600, mentenanță − 600)   ← previne blocajul din luna 3
function computeTargets(weightKg){
  const bmr = 10*weightKg + 6.25*state.profile.heightCm - 5*ageYears() + 5;
  const maintenance = Math.round(bmr * CONFIG.activityFactor);
  const dailyTarget = Math.max(CONFIG.dailyTargetFloor, maintenance - CONFIG.deficit);
  return {bmr:Math.round(bmr), maintenance, dailyTarget};
}
function currentWeight(){ const h=state.weightHistory; return h.length?h[h.length-1].kg:state.profile.startWeightKg; }
function lostKg(){ return state.profile.startWeightKg - currentWeight(); }
function toGoKg(){ return currentWeight() - state.profile.goalWeightKg; }
function pctToGoal(){ // 0..100, cât din cele 10 kg ai parcurs
  const total = state.profile.startWeightKg - state.profile.goalWeightKg;
  return total<=0?0:Math.max(0,Math.min(100, (lostKg()/total)*100));
}
// Ținta de pași crește 8k→12k pe măsură ce slăbești (în trepte de 250).
function stepGoalToday(){
  const frac = Math.max(0, Math.min(1, lostKg() / (state.profile.startWeightKg-state.profile.goalWeightKg||1)));
  const raw = CONFIG.stepGoalStart + (CONFIG.stepGoalEnd-CONFIG.stepGoalStart)*frac;
  return Math.round(raw/250)*250;
}
// Estimare dată de final din ritmul recent (regresie liniară pe ~28 zile).
function projection(){
  const h = state.weightHistory;
  if(h.length<2) return null;
  const today = todayKey();
  const recent = h.filter(e=>daysBetween(e.date,today)<=28);
  const pts = (recent.length>=2?recent:h.slice(-4)).map(e=>({x:daysBetween(h[0].date,e.date), y:e.kg}));
  const n=pts.length; if(n<2) return null;
  const sx=pts.reduce((s,p)=>s+p.x,0), sy=pts.reduce((s,p)=>s+p.y,0);
  const sxx=pts.reduce((s,p)=>s+p.x*p.x,0), sxy=pts.reduce((s,p)=>s+p.x*p.y,0);
  const slope=(n*sxy-sx*sy)/(n*sxx-sx*sx || 1);   // kg/zi
  if(!isFinite(slope) || slope>=-0.005) return null; // nu scade clar → fără estimare
  const daysLeft = (currentWeight()-state.profile.goalWeightKg)/(-slope);
  if(daysLeft<=0 || daysLeft>1000) return null;
  const d=new Date(); d.setDate(d.getDate()+Math.round(daysLeft));
  return dateKey(d);
}

/* ── Log-ul unei zile + scorul „cât de completă a fost" ── */
function blankLog(){
  return {fastOk:false, fastShortened:false, proteinG:0, waterMl:0, steps:0,
    workoutDone:false, noAlcohol:false, slept:false, supplements:false,
    cigarettes:0, hardUses:0};
}
function getLog(k){ if(!state.dailyLogs[k]) state.dailyLogs[k]=blankLog(); else
  state.dailyLogs[k]={...blankLog(), ...state.dailyLogs[k]}; return state.dailyLogs[k]; }
function planFor(dateKeyStr){
  const dow = parseKey(dateKeyStr).getDay();
  let type="odihna";
  if(state.settings.trainingDays.includes(dow)) type="forta";
  else if(dow===CONFIG.sportDay) type="sport";
  return {type, weigh:dow===CONFIG.weighDay, treat:dow===CONFIG.treatDay};
}
// Scorul zilei = obligatorii completate / total obligatorii (supliment & țigări NU contează).
function dayScore(k){
  const l=getLog(k), p=planFor(k);
  let done=0, total=0;
  const add=(ok)=>{ total++; if(ok) done++; };
  add(l.fastOk);
  add(l.proteinG>=CONFIG.proteinGoalG);
  add(l.waterMl>=CONFIG.waterGoalMl);
  add(l.steps>=stepGoalToday());
  add(p.type==="odihna" ? true : l.workoutDone);  // ziua de odihnă = bifată din start
  add(l.noAlcohol);
  add(l.slept);
  return total? done/total : 0;
}
function weightLoggedOn(k){ return state.weightHistory.some(e=>e.date===k); }
function activeDay(k){ return dayScore(k)>=0.5 || weightLoggedOn(k); }
// Serie: NU scade peste zi (dacă azi încă nu e activă, numărăm de ieri).
// Un gol o PUNE ÎN PAUZĂ, nu o aduce la zero, niciodată.
function computeStreak(){
  const today=todayKey();
  let cur=new Date(), paused=false;
  if(!activeDay(today)){ cur.setDate(cur.getDate()-1); paused=true; }
  let n=0;
  for(let i=0;i<500;i++){ const k=dateKey(cur);
    if(activeDay(k)){ n++; cur.setDate(cur.getDate()-1); } else break; }
  return {count:n, paused:paused && n>0};
}
function bestStreak(){
  const keys=Object.keys(state.dailyLogs).concat(state.weightHistory.map(e=>e.date));
  const set=new Set(keys.filter(activeDay));
  if(set.size===0) return 0;
  let best=0;
  for(const k of set){
    // numără doar începuturile de serie
    const prev=new Date(parseKey(k)); prev.setDate(prev.getDate()-1);
    if(set.has(dateKey(prev))) continue;
    let n=0, cur=new Date(parseKey(k));
    while(set.has(dateKey(cur))){ n++; cur.setDate(cur.getDate()+1); }
    best=Math.max(best,n);
  }
  return best;
}

/* ═══════════════════ 6. ACȚIUNI (mutate → save → render) ═══════════════════ */
function setLog(k, patch){ state.dailyLogs[k]={...getLog(k), ...patch}; save(); render(); }
function addProtein(g){ const k=todayKey(); setLog(k,{proteinG:Math.max(0,getLog(k).proteinG+g)}); }
function addWater(ml){ const k=todayKey(); setLog(k,{waterMl:Math.max(0,getLog(k).waterMl+ml)}); }
function addSteps(n){ const k=todayKey(); setLog(k,{steps:Math.max(0,getLog(k).steps+n)}); }
function toggle(field){ const k=todayKey(); setLog(k,{[field]:!getLog(k)[field]}); }

function logWeight(kg){
  if(!(kg>0)) return;
  const k=todayKey();
  state.weightHistory=state.weightHistory.filter(e=>e.date!==k);
  state.weightHistory.push({date:k, kg:Math.round(kg*10)/10});
  state.weightHistory.sort((a,b)=>a.date<b.date?-1:1);
  save(); checkMilestone(); render();
}
function logWaist(waist, belly){
  const k=todayKey();
  state.waistHistory=state.waistHistory.filter(e=>e.date!==k);
  const last=state.waistHistory[state.waistHistory.length-1]||{};
  state.waistHistory.push({date:k, waist:waist||last.waist, belly:belly||last.belly});
  state.waistHistory.sort((a,b)=>a.date<b.date?-1:1); save(); render();
}
// Praguri la fiecare 2 kg: 78,76,74,72,70. Modal de sărbătoare o singură dată.
function checkMilestone(){
  const w=currentWeight();
  for(let m=state.profile.startWeightKg-2; m>=state.profile.goalWeightKg; m-=2){
    if(w<=m && !state.celebrated.includes(m)){
      state.celebrated.push(m); save();
      showMilestone(m); break;
    }
  }
}

function fastingStatus(){
  const k=todayKey(), l=getLog(k);
  const startStr = l.fastShortened ? CONFIG.eatStartShort : state.settings.eatStart;
  const start=minutesOf(startStr), end=minutesOf(state.settings.eatEnd);
  const now=new Date().getHours()*60 + new Date().getMinutes();
  if(now<start) return {txt:S.fastBefore.replace("{start}",startStr).replace("{h}",fmtDur(start-now)), startStr};
  if(now<end)   return {txt:S.fastIn.replace("{start}",startStr).replace("{end}",state.settings.eatEnd).replace("{h}",fmtDur(end-now)), startStr};
  return {txt:S.fastAfter.replace("{start}",state.settings.eatStart), startStr};
}
function motivLine(){
  const lost=lostKg();
  if(lost<=0) return S.motivStart;
  const idx = parseInt(todayKey().replace(/-/g,""),10) % S.motiv.length;
  return S.motiv[idx].replace("{lost}", (Math.round(lost*10)/10)).replace("{rem}", (Math.round(toGoKg()*10)/10));
}
// Linia calmă de sub greutate (lost + rămas + „de ce"-ul, kg-ul slăbit în lime).
function calmLine(){
  const lost=Math.round(lostKg()*10)/10;
  if(lost<=0) return S.motivStart;
  return `Ai slăbit <b style="color:var(--lime);font-weight:600">${lost} kg</b> — mai ai ${Math.round(toGoKg()*10)/10}. ${S.calmTail}`;
}
const MON3=["IAN","FEB","MAR","APR","MAI","IUN","IUL","AUG","SEP","OCT","NOV","DEC"];
function fmtClock(mins){ const h=Math.floor(mins/60), m=mins%60; return h+":"+String(m).padStart(2,"0"); }
// Starea ferestrei de mâncare: text, numărătoare, etichetă, % pentru bară.
function fastingInfo(){
  const l=getLog(todayKey());
  const startStr=l.fastShortened?CONFIG.eatStartShort:state.settings.eatStart;
  const start=minutesOf(startStr), end=minutesOf(state.settings.eatEnd);
  const now=new Date().getHours()*60+new Date().getMinutes();
  const win=startStr+" – "+state.settings.eatEnd;
  if(now<start){                                   // încă în post → numărăm spre masă
    const fastLen=(1440-end)+start, elapsed=(1440-end)+now;
    return {win, count:fmtClock(start-now), label:S.untilMeal, pct:Math.min(100,elapsed/fastLen*100)};
  }
  if(now<end){                                     // în fereastră → spre închidere
    return {win, count:fmtClock(end-now), label:S.untilClose, pct:(now-start)/(end-start)*100};
  }
  return {win, count:"✓", label:S.eveningFast, pct:100};
}

/* ── PROGRES ── */
function weightChartSVG(){
  const h=state.weightHistory; if(h.length===0) return "";
  const W=320, H=170, padL=30, padR=10, padT=14, padB=22;
  const goal=state.profile.goalWeightKg;
  const ys=h.map(e=>e.kg).concat([goal]);
  let min=Math.min(...ys), max=Math.max(...ys);
  if(max-min<2){min-=1;max+=1;}
  min=Math.floor(min)-0.5; max=Math.ceil(max)+0.5;
  const x0=parseKey(h[0].date).getTime();
  const x1=Math.max(parseKey(h[h.length-1].date).getTime(), x0+86400000);
  const X=t=>padL+((t-x0)/(x1-x0))*(W-padL-padR);
  const Y=v=>padT+(1-(v-min)/(max-min))*(H-padT-padB);
  const pts=h.map(e=>[X(parseKey(e.date).getTime()), Y(e.kg)]);
  const line=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const area=`M${pts[0][0].toFixed(1)} ${(H-padB)} `+pts.map(p=>"L"+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ")+` L${pts[pts.length-1][0].toFixed(1)} ${(H-padB)} Z`;
  const gy=Y(goal);
  // Punct amber pe ultimul prag de 2 kg atins (ex. 78 kg ✓).
  const lost=state.profile.startWeightKg-currentWeight();
  let amberDot="";
  if(lost>=2){
    const m=state.profile.startWeightKg-2*Math.floor(lost/2);   // pragul atins
    let nearest=pts[0], bestD=Infinity;
    h.forEach((e,i)=>{ const d=Math.abs(e.kg-m); if(d<bestD){bestD=d; nearest=pts[i];} });
    amberDot=`<circle cx="${nearest[0].toFixed(1)}" cy="${nearest[1].toFixed(1)}" r="4.5" fill="#E8B27D" stroke="#16191D" stroke-width="2"/>`;
  }
  const end=pts[pts.length-1];
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#C8FF3C" stop-opacity=".28"/><stop offset="1" stop-color="#C8FF3C" stop-opacity="0"/>
      </linearGradient>
      <filter id="glow" x="-20%" y="-50%" width="140%" height="200%">
        <feDropShadow dx="0" dy="0" stdDeviation="2.4" flood-color="#C8FF3C" flood-opacity=".55"/>
      </filter>
    </defs>
    <path d="${area}" fill="url(#g)"/>
    <line x1="${padL}" y1="${gy}" x2="${W-padR}" y2="${gy}" stroke="#E8B27D" stroke-width="1.4" stroke-dasharray="5 5"/>
    <text x="${padL+2}" y="${gy-5}" fill="#E8B27D" font-size="9.5">${goal} kg</text>
    <path d="${line}" fill="none" stroke="#C8FF3C" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)"/>
    ${amberDot}
    <circle cx="${end[0].toFixed(1)}" cy="${end[1].toFixed(1)}" r="4" fill="#C8FF3C"/>
    <text x="${padL}" y="${H-6}" fill="#5b646c" font-size="9.5">${fmtDate(h[0].date)}</text>
    <text x="${W-padR}" y="${H-6}" fill="#5b646c" font-size="9.5" text-anchor="end">${fmtDate(h[h.length-1].date)}</text>
  </svg>`;
}
function miniTrend(history, field, unit){
  const h=history.filter(e=>e[field]!=null); if(h.length===0) return "";
  const first=h[0][field], last=h[h.length-1][field], diff=last-first;
  const dir = diff<0?`<span class="accent">▼ ${Math.abs(diff)} ${unit}</span>`:diff>0?`<span class="warn">▲ ${diff} ${unit}</span>`:`<span class="muted">—</span>`;
  return `<b>${last} ${unit}</b> &nbsp;<span class="sm">${dir}</span>`;
}

    ["suc / energizant","apă cu lămâie, sau cafea (până la 14:00)"],
    ["ciocolată cu lapte","2–3 pătrățele de ciocolată neagră 85%, savurate lent"],
    ["bere a doua","apă minerală cu lămâie/lime — la fel de rece, fără calorii"],
    ["iaurt cu fructe (zaharat)","iaurt grecesc simplu + fructe proaspete + scorțișoară"],
    ["cereale dulci dimineața","omletă cu 3 ouă + legume (după ce se deschide fereastra)"],
    ["paste mari seara","porție mai mică + multă proteină + salată; pune proteina prima"],
  ];
  const swapHtml=swaps.map(s=>`<div class="swap"><span class="x">✗ ${s[0]}</span><br><span class="y">✓ ${s[1]}</span></div>`).join("");

  return `<h2 style="margin:22px 0 12px">${S.cheats}</h2>

  <details><summary>🍽️ ${S.swapTitle}</summary><div class="body">
    <p style="margin-bottom:6px">${S.swapIntro}</p>${swapHtml}
  </div></details>

  <details><summary>💪 ${S.workoutSheet}</summary><div class="body">
    <p>3×/săptămână (Lu/Mi/Vi), dimineața, pe nemâncate, ~25–30 min. Progresezi prin <b>pârghie & repetări</b>, nu greutăți.</p>
    <p style="margin-top:10px"><b>Genuflexiuni (squat)</b> — fără greutate → pauză jos 2s → pe un picior (asistat).</p>
    <p style="margin-top:8px"><b>Șold/hinge</b> — hip thrust pe podea → pe un picior → pas mare (lunge).</p>
    <p style="margin-top:8px"><b>Împins (push)</b> — flotări la perete → pe genunchi → pe vârfuri → mâinile apropiate.</p>
    <p style="margin-top:8px"><b>Tras (pull)</b> — rânduri la masă (sub o masă solidă) → pe un braț; sau bandă elastică.</p>
    <p style="margin-top:8px"><b>Core</b> — plank 20s → 40s → side plank → mountain climbers lente.</p>
    <p style="margin-top:10px">3 ture: 8–12 repetări/exercițiu, 60s pauză. Când 12 devin ușoare, treci la varianta mai grea.</p>
    <p style="margin-top:10px" class="faint">${S.backpackNote}</p>
  </div></details>

  <details><summary>💊 ${S.suppSheet}</summary><div class="body">
    <p><b>Dimineața:</b> cafea/cofeină · vitamina D3 · creatină 5 g (în orice moment, dar e ok dimineața).</p>
    <p style="margin-top:8px"><b>La masă:</b> whey (proteine) dacă nu prinzi 150 g din mâncare · omega-3.</p>
    <p style="margin-top:8px"><b>Seara:</b> magneziu (somn & relaxare).</p>
    <p style="margin-top:10px" class="faint">${S.suppGP}</p>
  </div></details>

  <details><summary>☕ ${S.coffeeSheet}</summary><div class="body"><p>${S.coffeeBody}</p></div></details>`;
}

/* ═══════════════════ 9. MODALE / ONBOARDING / PIN ═══════════════════ */
function openOverlay(html, extra){ $overlay.innerHTML=`<div class="sheet ${extra||""}">${html}</div>`; $overlay.classList.add("show"); }
function closeOverlay(){ $overlay.classList.remove("show"); $overlay.innerHTML=""; }

function renderOnboarding(){
  const p=state.profile, w=state.waistHistory[0]||{};
  // Toate câmpurile sunt pre-completate cu valori-șablon neutre; le înlocuiești
  // cu ale tale. Ce scrii aici rămâne DOAR pe telefon (localStorage).
  const num=(id,val,ph)=>`<input class="text" id="${id}" type="number" inputmode="decimal" step="any" value="${val||""}" placeholder="${ph||""}"/>`;
  $overlay.innerHTML=`<div class="sheet">
    <div class="modal-emoji">💚</div>
    <h1 class="center" style="margin:10px 0">${S.obWelcome}</h1>
    <p class="muted" style="margin-bottom:14px">${S.obIntro}</p>
    <label class="fld">${S.obName}</label>
    <input class="text" id="obName" type="text" value="${p.name||""}" placeholder="—"/>
    <div class="grid2">
      <div><label class="fld">${S.obAge}</label>${num("obAge",p.age)}</div>
      <div><label class="fld">${S.obHeight}</label>${num("obHeight",p.heightCm)}</div>
      <div><label class="fld">${S.obStartW}</label>${num("obStartW",p.startWeightKg)}</div>
      <div><label class="fld">${S.obGoalW}</label>${num("obGoalW",p.goalWeightKg)}</div>
      <div><label class="fld">${S.obWaist}</label>${num("obWaist",w.waist)}</div>
      <div><label class="fld">${S.obBelly}</label>${num("obBelly",w.belly)}</div>
    </div>
    <label class="fld">${S.obWhyLabel}</label>
    <textarea id="obWhy">${p.why}</textarea>
    <p class="sm faint" style="margin:14px 0">${S.disclaimer}</p>
    <button class="btn primary full" data-action="finish-onboarding">${S.obStart}</button>
  </div>`;
  $overlay.classList.add("show");
}
function showMilestone(w){
  const lost=Math.round(lostKg()*10)/10;
  openOverlay(`
    <div class="halo">🎉</div>
    <div class="eyebrow" style="color:var(--lime);letter-spacing:1.5px">${w} ${S.milestoneUnlocked}</div>
    <div class="num" style="font-size:60px;line-height:.9;margin:8px 0 4px">−${lost}<span class="u" style="font-size:.43em">KG</span></div>
    <p style="color:var(--muted);font-size:15.5px;margin-bottom:18px">${S.milestoneBody1.replace("{lost}",lost)} <b style="color:var(--text);font-weight:600">${S.milestoneBody2}</b></p>
    <button class="btn primary full" data-action="close-modal">${S.milestoneClose}</button>
    <button class="btn ghost full" style="min-height:40px;color:var(--faint);font-size:13px;margin-top:6px" data-action="go-progres">${S.milestoneSee}</button>`, "celebrate");
}
function showHard(){
  const k=todayKey(); setLog(k,{hardUses:getLog(k).hardUses+1});
  openOverlay(`
    <div class="modal-emoji">🫂</div>
    <h2 class="center" style="margin:10px 0">${S.hardTitle}</h2>
    <p class="muted" style="white-space:pre-line;margin-bottom:14px">${S.hardBody}</p>
    <div class="card tight" style="margin-bottom:14px"><div class="sm muted">Dacă mănânci, alege proteină:</div><p style="margin-top:6px">${S.hardSnacks}</p></div>
    <button class="btn primary full" data-action="close-modal">${S.hardClose}</button>`);
}
function renderLock(){
  $overlay.innerHTML=`<div class="sheet center">
    <div class="modal-emoji">🔒</div>
    <h2 style="margin:12px 0">PIN</h2>
    <input class="text center" id="pinInput" type="password" inputmode="numeric" maxlength="8" style="font-size:24px;letter-spacing:8px" />
    <p class="sm danger" id="pinErr" style="margin-top:8px">&nbsp;</p>
    <button class="btn primary full" style="margin-top:8px" data-action="unlock">Deblochează</button>
  </div>`;
  $overlay.classList.add("show");
  setTimeout(()=>document.getElementById("pinInput")?.focus(),50);
}

/* ═══════════════════ 10. EXPORT / IMPORT ═══════════════════ */
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=url; a.download=`minus10-backup-${todayKey()}.json`; a.click();
  URL.revokeObjectURL(url);
  state.settings.lastBackup=todayKey(); save(); render();
}
function importData(){
  const inp=document.createElement("input"); inp.type="file"; inp.accept="application/json,.json";
  inp.onchange=()=>{ const f=inp.files[0]; if(!f) return; const r=new FileReader();
    r.onload=()=>{ try{ const d=JSON.parse(r.result); state=migrate(d); save(); app.unlocked=true; render(); }
      catch(e){ alert("Fișier invalid."); } }; r.readAsText(f); };
  inp.click();
}

/* ═══════════════════ 11. EVENT DELEGATION ═══════════════════ */
// Salvăm poziția de scroll ca să nu sară sus la fiecare re-render.
document.getElementById("scroll").addEventListener("scroll", e=>{ app._scroll=e.target.scrollTop; });

document.querySelectorAll("#nav button").forEach(b=>{
  b.addEventListener("click", ()=>{ app.screen=b.dataset.nav; app._scroll=0; render(); });
});

function readNum(id){ const el=document.getElementById(id); return el?parseFloat(el.value):NaN; }

document.body.addEventListener("click", (e)=>{
  const btn=e.target.closest("[data-action]"); if(!btn) return;
  const a=btn.dataset.action;

  // toggles: "t:field"
  if(a.startsWith("t:")) return toggle(a.slice(2));
  // counters
  if(a.startsWith("protfood:")){ const f=PROTEIN_FOODS[parseInt(a.split(":")[1])]; if(f) addProtein(f.g); return; }
  if(a.startsWith("prot:")){ const v=a.split(":")[1];
    if(v==="custom"){ const n=readNum("protCustom"); if(n>0) addProtein(Math.round(n)); } else addProtein(parseInt(v)); return; }
  if(a.startsWith("water:")) return addWater(parseInt(a.split(":")[1]));
  if(a.startsWith("steps:")){ const v=a.split(":")[1];
    if(v==="custom"){ const n=readNum("stepCustom"); if(n>0) addSteps(Math.round(n)); } else addSteps(parseInt(v)); return; }
  if(a.startsWith("cig:")) { const k=todayKey(); return setLog(k,{cigarettes:Math.max(0,getLog(k).cigarettes+parseInt(a.split(":")[1]))}); }

  switch(a){
    case "hard": return showHard();
    case "shorten": return setLog(todayKey(),{fastShortened:true});
    case "close-modal": return closeOverlay();
    case "go-progres": closeOverlay(); app.screen="progres"; return render();
    case "apply-update": return applyUpdate();

    case "save-weight": { const v=readNum("wInput"); if(v>0){ logWeight(v); } return; }
    case "save-waist": { logWaist(readNum("waistInput"), readNum("bellyInput")); return; }

    case "edit-why": { const v=prompt(S.jWhy, state.profile.why); if(v!=null){ state.profile.why=v.trim()||state.profile.why; save(); render(); } return; }
    case "edit-window": {
      const s=prompt("Ora de start (HH:MM)", state.settings.eatStart); if(s==null) return;
      const en=prompt("Ora de final (HH:MM)", state.settings.eatEnd); if(en==null) return;
      if(/^\d{1,2}:\d{2}$/.test(s)&&/^\d{1,2}:\d{2}$/.test(en)){ state.settings.eatStart=s; state.settings.eatEnd=en; save(); render(); } return; }

    case "export": return exportData();
    case "import": return importData();
    case "toggle-smoke": state.settings.showSmoking=!state.settings.showSmoking; save(); render(); return;
    case "toggle-pin": {
      if(state.settings.pin){ if(confirm("Scoți PIN-ul?")){ state.settings.pin=null; save(); render(); } }
      else { const p=prompt("Alege un PIN (cifre):"); if(p&&/^\d{3,8}$/.test(p)){ state.settings.pin=p; app.unlocked=true; save(); render(); } else if(p) alert("PIN invalid (3–8 cifre)."); }
      return; }
    case "unlock": {
      const v=document.getElementById("pinInput").value;
      if(v===state.settings.pin){ app.unlocked=true; closeOverlay(); render(); }
      else { document.getElementById("pinErr").textContent="PIN greșit. Mai încearcă."; }
      return; }

    case "relog-blood": return relogBlood();
    case "save-blood": return saveBlood();

    case "finish-onboarding": {
      const v=id=>document.getElementById(id).value;
      const n=id=>{ const x=parseFloat(v(id)); return isFinite(x)?x:null; };
      const p=state.profile;
      p.name=(v("obName")||"").trim();
      p.age = n("obAge") ?? p.age;
      p.heightCm = n("obHeight") ?? p.heightCm;
      const sw = n("obStartW") ?? p.startWeightKg;
      const gw = n("obGoalW") ?? p.goalWeightKg;
      p.startWeightKg = sw;
      p.goalWeightKg = gw;
      const why=v("obWhy").trim(); p.why = why||p.why;
      // Prima înregistrare reală de greutate & talie/burtă (înlocuiește șablonul).
      const today=todayKey();
      state.weightHistory=[{date:today, kg:Math.round(sw*10)/10}];
      const waist=n("obWaist"), belly=n("obBelly");
      state.waistHistory=[{date:today, waist:waist??CONFIG.startWaistCm, belly:belly??CONFIG.startBellyCm}];
      state.celebrated=[];   // pornim curat — niciun prag „atins" din șablon
      p.onboarded=true; save(); closeOverlay(); app.screen="azi"; render(); return; }
  }

  // training-day toggles: "td:N"
  if(a.startsWith("td:")){ const d=parseInt(a.slice(3));
    const set=new Set(state.settings.trainingDays);
    set.has(d)?set.delete(d):set.add(d);
    state.settings.trainingDays=[...set].sort(); save(); render(); return; }
});

// Câmpurile de analize, într-un loc (cod intern + etichetă + unitate).
const BLOOD_FIELDS=[["hdl","HDL","mg/dL"],["ldl","LDL","mg/dL"],["nonHdl","Non-HDL","mg/dL"],
  ["total","Colesterol total","mg/dL"],["trig","Trigliceride","mg/dL"],["glucose","Glucoză","mg/dL"],
  ["alt","ALT","U/L"],["ast","AST","U/L"],["creatinine","Creatinină","mg/dL"],["magnesium","Magneziu","mg/dL"]];

// Un SINGUR formular cu toate câmpurile, toate OPȚIONALE — completezi ce ai și
// salvezi o dată. Mult mai bun decât 10 ferestre de prompt una după alta.
function relogBlood(){
  const last=state.bloodHistory[state.bloodHistory.length-1] || {};
  const inputs=BLOOD_FIELDS.map(([f,label,unit])=>`
    <div><label class="fld">${label} <span class="faint">${unit}</span></label>
      <input class="text" id="b_${f}" type="number" inputmode="decimal" step="any" value="${last[f]??""}" placeholder="—"/></div>`).join("");
  openOverlay(`
    <h2 style="margin-bottom:6px">${S.bloodFormTitle}</h2>
    <p class="sm muted" style="margin-bottom:14px">${S.bloodFormHint}</p>
    <div class="grid2">${inputs}</div>
    <button class="btn primary full" style="margin-top:16px" data-action="save-blood">${S.save}</button>
    <button class="btn ghost full" style="margin-top:8px" data-action="close-modal">${S.cancel}</button>`);
}
function saveBlood(){
  const last=state.bloodHistory[state.bloodHistory.length-1] || {};
  const entry={date:todayKey()}; let any=false;
  for(const [f] of BLOOD_FIELDS){
    const raw=(document.getElementById("b_"+f).value||"").trim();
    if(raw!==""){ const n=parseFloat(raw); if(isFinite(n)){ entry[f]=n; any=true; continue; } }
    if(last[f]!=null) entry[f]=last[f];   // gol → păstrăm valoarea anterioară (dacă există)
  }
  if(!any){ closeOverlay(); return; }      // nimic completat → nu salvăm o intrare goală
  state.bloodHistory.push(entry); save(); closeOverlay(); app.screen="progres"; render();
}

/* ═══════════════════ 12. SERVICE WORKER + UPDATE BANNER ═══════════════════ */
let waitingWorker=null;
function applyUpdate(){
  if(waitingWorker){ waitingWorker.postMessage({type:"SKIP_WAITING"}); }
  document.getElementById("update").classList.remove("show");
}
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("./service-worker.js").then(reg=>{
      // Dacă există deja unul în așteptare → arată bannerul.
      if(reg.waiting && navigator.serviceWorker.controller){ waitingWorker=reg.waiting; showUpdate(); }
      reg.addEventListener("updatefound", ()=>{
        const nw=reg.installing;
        nw && nw.addEventListener("statechange", ()=>{
          if(nw.state==="installed" && navigator.serviceWorker.controller){ waitingWorker=nw; showUpdate(); }
        });
      });
    }).catch(()=>{});
    let reloaded=false;
    navigator.serviceWorker.addEventListener("controllerchange", ()=>{ if(!reloaded){ reloaded=true; location.reload(); } });
  });
}
function showUpdate(){ document.getElementById("update").classList.add("show"); }

/* ═══════════════════ START ═══════════════════ */
checkMilestone(); // sărbătorește dacă ai importat date deja sub un prag
render();
</script>
